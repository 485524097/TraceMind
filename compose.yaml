name: tracemind

services:
  postgres:
    image: postgres:18.4-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [tracemind]

  redis:
    image: redis:8.8.0-alpine3.23
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    networks: [tracemind]

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [tracemind]

  backend:
    profiles: [app]
    image: tracemind-backend:0.1.0
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-TraceMind API}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-tracemind_chunks}
      QDRANT_DENSE_VECTOR_NAME: ${QDRANT_DENSE_VECTOR_NAME:-dense_v1}
      QDRANT_OPERATION_TIMEOUT_SECONDS: ${QDRANT_OPERATION_TIMEOUT_SECONDS:-60}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-64}
      SEMANTIC_SEARCH_SCORE_THRESHOLD: ${SEMANTIC_SEARCH_SCORE_THRESHOLD:-0.50}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-auto}
      DOCUMENT_INDEX_STALE_AFTER_SECONDS: ${DOCUMENT_INDEX_STALE_AFTER_SECONDS:-1800}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
      DOCUMENT_STORAGE_ROOT: /app/data/uploads
      DOCUMENT_MAX_FILE_SIZE_BYTES: ${DOCUMENT_MAX_FILE_SIZE_BYTES:-52428800}
      DOCUMENT_UPLOAD_CHUNK_SIZE_BYTES: ${DOCUMENT_UPLOAD_CHUNK_SIZE_BYTES:-1048576}
      DOCUMENT_ALLOWED_EXTENSIONS: ${DOCUMENT_ALLOWED_EXTENSIONS:-.md,.txt,.pdf,.docx,.java,.jsp,.js,.ts,.vue,.sql,.xml,.json,.yaml,.yml,.properties,.py}
      DOCUMENT_PARSE_MAX_EXTRACTED_CHARS: ${DOCUMENT_PARSE_MAX_EXTRACTED_CHARS:-5000000}
      DOCUMENT_PARSE_MAX_PDF_PAGES: ${DOCUMENT_PARSE_MAX_PDF_PAGES:-1000}
      DOCUMENT_PARSE_STALE_AFTER_SECONDS: ${DOCUMENT_PARSE_STALE_AFTER_SECONDS:-1800}
      DOCUMENT_CHUNK_MAX_CHARS: ${DOCUMENT_CHUNK_MAX_CHARS:-1800}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    volumes:
      - ${DOCUMENT_STORAGE_HOST_PATH:-./data/uploads}:/app/data/uploads
    networks: [tracemind]

  celery-worker:
    profiles: [app]
    image: tracemind-celery-worker:0.1.0
    build:
      context: ./backend
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "celery", "-A", "app.worker.celery_app:celery_app", "worker", "--loglevel=INFO"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-tracemind_chunks}
      QDRANT_DENSE_VECTOR_NAME: ${QDRANT_DENSE_VECTOR_NAME:-dense_v1}
      QDRANT_OPERATION_TIMEOUT_SECONDS: ${QDRANT_OPERATION_TIMEOUT_SECONDS:-60}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-64}
      SEMANTIC_SEARCH_SCORE_THRESHOLD: ${SEMANTIC_SEARCH_SCORE_THRESHOLD:-0.50}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-auto}
      DOCUMENT_INDEX_STALE_AFTER_SECONDS: ${DOCUMENT_INDEX_STALE_AFTER_SECONDS:-1800}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
      DOCUMENT_STORAGE_ROOT: /app/data/uploads
      DOCUMENT_MAX_FILE_SIZE_BYTES: ${DOCUMENT_MAX_FILE_SIZE_BYTES:-52428800}
      DOCUMENT_UPLOAD_CHUNK_SIZE_BYTES: ${DOCUMENT_UPLOAD_CHUNK_SIZE_BYTES:-1048576}
      DOCUMENT_ALLOWED_EXTENSIONS: ${DOCUMENT_ALLOWED_EXTENSIONS:-.md,.txt,.pdf,.docx,.java,.jsp,.js,.ts,.vue,.sql,.xml,.json,.yaml,.yml,.properties,.py}
      DOCUMENT_PARSE_MAX_EXTRACTED_CHARS: ${DOCUMENT_PARSE_MAX_EXTRACTED_CHARS:-5000000}
      DOCUMENT_PARSE_MAX_PDF_PAGES: ${DOCUMENT_PARSE_MAX_PDF_PAGES:-1000}
      DOCUMENT_PARSE_STALE_AFTER_SECONDS: ${DOCUMENT_PARSE_STALE_AFTER_SECONDS:-1800}
      DOCUMENT_CHUNK_MAX_CHARS: ${DOCUMENT_CHUNK_MAX_CHARS:-1800}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ${DOCUMENT_STORAGE_HOST_PATH:-./data/uploads}:/app/data/uploads
    networks: [tracemind]

volumes:
  postgres-data:
  redis-data:
  qdrant-data:

networks:
  tracemind:
    driver: bridge
